name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Configure Android Project Settings
      run: |
        # R پیکیج کے غائب ہونے کے مسئلے کو حل کرنے کے لیے غیر متغیر کلاسز کو آف کرنا
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
        echo "android.nonTransitiveRClass=false" >> gradle.properties

        # غائب شدہ SngineConfig فائل کو جاوا فولڈر کے اندر خودکار طور پر تیار کرنا تاکہ جاوا ایرر ختم ہو جائے
        mkdir -p app/src/main/java/statull/app/webview
        cat << 'EOF' > app/src/main/java/statull/app/webview/SngineConfig.java
        package statull.app.webview;
        public class SngineConfig {
            public static boolean SngineApp_JSCRIPT = true;
            public static boolean SngineApp_FUPLOAD = true;
            public static boolean SngineApp_CAMUPLOAD = true;
            public static boolean SngineApp_ONLYCAM = false;
            public static boolean SngineApp_MULFILE = true;
            public static boolean SngineApp_LOCATION = true;
            public static boolean SngineApp_RATINGS = true;
            public static boolean SngineApp_PULLFRESH = true;
            public static boolean SngineApp_PBAR = true;
            public static boolean SngineApp_ZOOM = false;
            public static boolean SngineApp_SFORM = false;
            public static boolean SngineApp_OFFLINE = false;
            public static boolean SngineApp_EXTURL = true;
            public static boolean SngineApp_CERT_VERIFICATION = true;
            public static String Sngine_URL = "file:///android_asset/index.html";
            public static String Sngine_F_TYPE = "*/*";
            public static String Sngine_ONESIGNAL_APP_ID = "00000000-0000-0000-0000-000000000000";
        }
        EOF

    - name: Build APK Directly from Project
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
