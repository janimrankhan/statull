name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Force Fix Android Versions and Code Imports
      run: |
        # پروجیکٹ کو مستحکم گریڈل 8.5 اور AGP 8.2.2 پر لاک کرنا
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties

        # روٹ build.gradle کو مستحکم ورژن 8.2.2 پر سیٹ کرنا
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # اینڈرائیڈ کی ضروری پراپرٹیز سیٹ کرنا
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
        echo "android.nonTransitiveRClass=false" >> gradle.properties

        # غائب شدہ سٹرنگ آئی ڈی (sngine_demo) کو strings.xml فائل کے اندر عارضی طور پر شامل کرنا تاکہ AAPT ایرر حل ہو جائے
        STRINGS_FILE="app/src/main/res/values/strings.xml"
        if [ -f "$STRINGS_FILE" ]; then
          sed -i 's|</resources>|    <string name="sngine_demo">Statull</string>\n</resources>|g' "$STRINGS_FILE"
        fi

        # جاوا فائلز میں غائب شدہ امپورٹس (R اور SngineConfig) کو پیکیج لائن کے فوراً بعد انجیکٹ کرنا
        for file in app/src/main/java/statull/app/webview/MainActivity.java app/src/main/java/statull/app/webview/DialogManager.java app/src/main/java/statull/app/webview/SplashScreen.java; do
          if [ -f "$file" ]; then
            sed -i 's|^package statull.app.webview;|package statull.app.webview;\nimport statull.app.webview.R;\nimport statull.app.webview.SngineConfig;|g' "$file"
          fi
        done

    - name: Build APK Directly from Project
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
