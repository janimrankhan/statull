name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # AGP 9.x کے لیے جاوا 17 لازمی ہے
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1 # آپ کی gradle-wrapper.properties کے مطابق ورژن سیٹ کر دیا گیا ہے

    - name: Configure Android Project Settings
      run: |
        # اینڈرائیڈ کی پراپرٹیز کو جدید ورژنز کے مطابق سیٹ کرنا
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties

    - name: Build APK Directly from Project
      run: |
        # آپ کی اپنی wrapper فائل کو استعمال کرتے ہوئے بلڈ رن کرنا
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
