name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Configure Android Project Settings
      run: |
        # اینڈرائیڈ ایکس پراپرٹیز کی موجودگی یقینی بنانا
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties

    - name: Build APK Directly from Project
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
