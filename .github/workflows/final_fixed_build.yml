name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # AGP 9.1.1 کے لیے جاوا 17 آفیشل ورژن ہے
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1 # آپ کی اپنی gradle-wrapper فائل کے ورژن کے مطابق

    - name: Configure Android Project Settings
      run: |
        # ورژن 35 کی عدم مطابقت کو دور کرنے کے لیے پراپرٹیز سیٹ کرنا
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=false" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties

    - name: Build APK Directly from Project
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
