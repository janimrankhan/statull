name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Build Brand New Web-To-APK App
      run: |
        # پرانی تمام متصادم فائلوں اور فولڈرز کو کلاؤڈ میموری سے مکمل صاف کرنا
        rm -rf fresh-app app build.gradle settings.gradle gradle.properties gradlew gradlew.bat gradle final-android-app separate-android-app
        
        # برانڈ نیو اینڈرائیڈ اسٹرکچر کلاؤڈ میموری میں خود بنانا
        mkdir -p fresh-app/app/src/main/java/statull/app/webview
        mkdir -p fresh-app/app/src/main/assets
        mkdir -p fresh-app/app/src/main/res/values

        # صرف آپ کی ویب سائٹ کی فائلوں کو اثاثوں (Assets) میں منتقل کرنا
        find . -maxdepth 1 ! -name 'fresh-app' ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec cp -r {} fresh-app/app/src/main/assets/ \; 2>/dev/null || true

        # انڈیکس فائل کی موجودگی یقینی بنانا
        if [ ! -f fresh-app/app/src/main/assets/index.html ]; then
          find . -maxdepth 3 -name "index.html" -exec cp {} fresh-app/app/src/main/assets/ \; 2>/dev/null || true
        fi

        # ڈیفالٹ تھیم فائل بنانا تاکہ 'package R does not exist' کا مسئلہ جڑ سے ختم ہو جائے
        cat << 'EOF' > fresh-app/app/src/main/res/values/styles.xml
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"></style>
        </resources>
        EOF

        # اینڈرائیڈ کی کنفیگریشن فائلیں بنانا
        echo "include ':app'" > fresh-app/settings.gradle
        echo "android.useAndroidX=true" > fresh-app/gradle.properties
        echo "android.enableJetifier=true" >> fresh-app/gradle.properties

        # روٹ بلڈ فائل
        cat << 'EOF' > fresh-app/build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # ایپ بلڈ فائل (مستحکم اور 100٪ کام کرنے والی کنفیگریشن)
        cat << 'EOF' > fresh-app/app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'statull.app.webview'
            compileSdk 34
            defaultConfig {
                applicationId 'statull.app.webview'
                minSdk 21
                targetSdk 34
                versionCode 16
                versionName 'v4.4'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        # بالکل درست اور کلین اینڈرائیڈ مینی فیسٹ فائل بنانا
        cat << 'EOF' > fresh-app/app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://android.com">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:theme="@style/AppTheme" android:label="Statull" android:allowBackup="true">
                <activity android:name="statull.app.webview.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # بالکل برانڈ نیو اور کلین جاوا رن ٹائم فائل بنانا جو براہ راست آپ کی لائیو سائٹ کو لوڈ کرے گی
        cat << 'EOF' > fresh-app/app/src/main/java/statull/app/webview/MainActivity.java
        package statull.app.webview;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                // آپ کی ویب سائٹ کا لائیو لنک یہاں زبردستی لاک کر دیا گیا ہے
                webView.loadUrl("https://statull.com");
                setContentView(webView);
            }
        }
        EOF

    - name: Pure Build Without Cache
      run: |
        cd fresh-app
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: fresh-app/app/build/outputs/apk/debug/app-debug.apk
