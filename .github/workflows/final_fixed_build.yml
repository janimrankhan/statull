name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    - name: Configure Android Project Settings
      run: |
        # اینڈرائیڈ کی پراپرٹیز کو جدید ورژنز کے مطابق سیٹ کرنا
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
        echo "android.nonTransitiveRClass=false" >> gradle.properties

        # پرانی تمام متصادم SngineConfig فائلز کو صاف کر کے بلڈ فولڈر کے اندر بالکل درست پبلک سنٹیکس کے ساتھ دوبارہ بنانا
        rm -f app/src/main/java/statull/app/webview/SngineConfig.java
        mkdir -p app/src/main/java/statull/app/webview
        cat << 'EOF' > app/src/main/java/statull/app/webview/SngineConfig.java
        package statull.app.webview;

        public class SngineConfig {
            public static String Sngine_URL = "https://statull.com";
            public static String Sngine_ONESIGNAL_APP_ID = "";
            public static boolean SngineApp_JSCRIPT = true;
            public static boolean SngineApp_FUPLOAD = true;
            public static boolean SngineApp_CAMUPLOAD = true;
            public static boolean SngineApp_ONLYCAM = false;
            public static boolean SngineApp_MULFILE = true;
            public static boolean SngineApp_LOCATION = true;
            public static boolean SngineApp_RATINGS = true;
            public static boolean SngineApp_PULLFRESH = true;
            public static boolean SngineApp_PBAR = true;
            public static boolean SngineApp_ZOOM = false;
            public static boolean SngineApp_SFORM = false;
            public static boolean SngineApp_OFFLINE = false;
            public static boolean SngineApp_EXTURL = false;
            public static boolean SngineApp_CERT_VERIFICATION = true;
            public static String Sngine_F_TYPE = "*/*";
            public static int ASWR_DAYS = 3;
            public static int ASWR_TIMES = 10;
            public static int ASWR_INTERVAL = 2;
        }
        EOF

        # 'package R does not exist' اور غائب شدہ امپورٹس کے مسائل کو مستقل فکس کرنے کے لیے فائلز کے ہیڈرز کو کلین کرنا
        # ہم فائلز کی پہلی لائن (package) کے فوراً بعد درست امپورٹ اسٹیٹمنٹس زبردستی انپٹ کر رہے ہیں
        sed -i '/package statull.app.webview;/a import statull.app.webview.R;\nimport statull.app.webview.SngineConfig;' app/src/main/java/statull/app/webview/MainActivity.java || true
        sed -i '/package statull.app.webview;/a import statull.app.webview.R;\nimport statull.app.webview.SngineConfig;' app/src/main/java/statull/app/webview/DialogManager.java || true
        sed -i '/package statull.app.webview;/a import statull.app.webview.R;\nimport statull.app.webview.SngineConfig;' app/src/main/java/statull/app/webview/SplashScreen.java || true

    - name: Build APK Directly from Project
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
