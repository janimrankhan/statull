name: Final Capacitor APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' # جاوا ورژن کو 21 کر دیا گیا ہے تاکہ 'invalid source release: 21' کا ایرر ختم ہو جائے
        distribution: 'zulu'

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build Web App with Capacitor Fix
      run: |
        # پرانے تمام عارضی فولڈرز اور فائلیں صاف کرنا
        rm -rf fresh-app app build.gradle settings.gradle gradle.properties gradlew gradlew.bat gradle final-android-app separate-android-app android www
        
        # کیپیسیٹر ٹول سیٹ کرنا
        npm init -y
        npm install @capacitor/core @capacitor/cli
        
        # www فولڈر بنانا اور آپ کی تمام لوکل فائلوں کو اس میں کاپی کرنا
        mkdir -p www
        cp -r * www/ || true
        rm -rf www/www www/node_modules
        
        # اگر انڈیکس فائل کسی دوسرے فولڈر میں چھپی ہو تو اسے تلاش کر کے باہر لانا
        if [ ! -f www/index.html ]; then
          find . -name "index.html" -exec cp {} www/ \; 2>/dev/null || true
        fi
        
        # اگر پھر بھی انڈیکس فائل نہ ملے تو عارضی انڈیکس بنانا
        if [ ! -f www/index.html ]; then
          echo "<!DOCTYPE html><html><head><title>Statull</title></head><body><script>window.location.href='https://statull.com';</script></body></html>" > www/index.html
        fi
        
        # اینڈرائیڈ پروجیکٹ جنریٹ کرنا
        npx cap init "Statull App" "statull.app.webview" --web-dir=www
        npm install @capacitor/android
        npx cap add android
        npx cap sync

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.11.1 # آپ کے کلاؤڈ پروجیکٹ کی سیٹنگز کے مطابق گریڈل ورژن فکس کر دیا گیا ہے

    - name: Build APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
