name: Final Custom APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.10 # یہاں درست اور موجودہ جدید گریڈل ورژن سیٹ کر دیا گیا ہے

    - name: Configure Android Project Settings
      run: |
        # گریڈل کے ورژنز کی مطابقت کے لیے پراپرٹیز کو اپڈیٹ کرنا
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
        echo "android.nonTransitiveRClass=false" >> gradle.properties

        # جاوا فائلوں کے اندر زبردستی R پیکیج امپورٹ کرنا
        sed -i '2i import statull.app.webview.R;' app/src/main/java/statull/app/webview/MainActivity.java 2>/dev/null || true
        sed -i '2i import statull.app.webview.R;' app/src/main/java/statull/app/webview/DialogManager.java 2>/dev/null || true

    - name: Build APK Directly from Project
      run: |
        gradle wrapper --gradle-version 8.10
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
