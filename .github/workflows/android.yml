name: Build Android APK Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Build Android Structure Inside Folder
      run: |
        # مکمل اینڈرائیڈ اسٹرکچر ایک ہی فولڈر کے اندر بنانا
        mkdir -p android-app/app/src/main/java/com/janimrankhan/statull
        mkdir -p android-app/app/src/main/assets

        # آپ کی ویب سائٹ کی فائلیں کاپی کرنا
        find . -maxdepth 1 ! -name 'android-app' ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec cp -r {} android-app/app/src/main/assets/ \; 2>/dev/null || true

        # انڈیکس فائل مینیج کرنا
        if [ ! -f android-app/app/src/main/assets/index.html ]; then
          find . -name "index.html" -exec cp {} android-app/app/src/main/assets/ \; 2>/dev/null || true
        fi

        # اینڈرائیڈ کی کنفیگریشن فائلیں بنانا
        echo "include ':app'" > android-app/settings.gradle
        
        # اینڈرائیڈ ایکس (AndroidX) کو لازمی آن کرنا (اسی کا ایرر آ رہا تھا)
        echo "android.useAndroidX=true" > android-app/gradle.properties

        # مین بلڈ فائل
        cat << 'EOF' > android-app/build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # ایپ بلڈ فائل
        cat << 'EOF' > android-app/app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.janimrankhan.statull'
            compileSdk 34
            defaultConfig {
                applicationId "com.janimrankhan.statull"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        # مینی فیسٹ فائل
        cat << 'EOF' > android-app/app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://android.com" package="com.janimrankhan.statull">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:label="Statull" android:allowBackup="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # جاوا مین ایکٹیویٹی فائل
        cat << 'EOF' > android-app/app/src/main/java/com/janimrankhan/statull/MainActivity.java
        package com.janimrankhan.statull;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF

    - name: Generate Wrapper and Build APK File
      run: |
        cd android-app
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: android-app/app/build/outputs/apk/debug/app-debug.apk
