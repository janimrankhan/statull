name: Build Web to APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Capacitor & Create Dummy Assets
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli
        # Capacitor کی ضرورت کے مطابق بنیادی فائلیں بنانا
        mkdir -p src
        touch index.html
        npx cap init "Statull App" "com.janimrankhan.statull" --web-dir=.
        npm install @capacitor/android
        npx cap add android
        npx cap sync

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Change Directory & Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Web-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
