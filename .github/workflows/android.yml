name: Build Simple Web to APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Create Android Native Project Structure
      run: |
        mkdir -p android-app/app/src/main/java/com/janimrankhan/statull
        mkdir -p android-app/app/src/main/assets
        mkdir -p android-app/gradle/wrapper

        # آپ کی ویب سائٹ کی فائلوں کو کاپی کرنا
        cp -r * android-app/app/src/main/assets/ || true
        rm -rf android-app/app/src/main/assets/android-app

        echo "include ':app'" > android-app/settings.gradle

        cat << 'EOF' > android-app/build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat << 'EOF' > android-app/app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.janimrankhan.statull'
            compileSdk 34
            defaultConfig {
                applicationId "com.janimrankhan.statull"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        cat << 'EOF' > android-app/app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://android.com" package="com.janimrankhan.statull">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:label="Statull" android:allowBackup="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > android-app/app/src/main/java/com/janimrankhan/statull/MainActivity.java
        package com.janimrankhan.statull;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF

    - name: Download Wrapper
      run: |
        cd android-app
        gradle wrapper --gradle-version 8.5

    - name: Build Android APK
      run: |
        cd android-app
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: android-app/app/build/outputs/apk/debug/app-debug.apk
