name: Super Clean APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Generate Fresh Android Project
      run: |
        # پرانے تمام خراب فولڈرز اور فائلیں کلاؤڈ میموری سے صاف کرنا
        rm -rf android-app separate-android-app app build.gradle settings.gradle gradle.properties gradlew gradlew.bat gradle
        
        # برانڈ نیو فولڈر اسٹرکچر بنانا
        mkdir -p fresh-app/app/src/main/java/com/janimrankhan/statull
        mkdir -p fresh-app/app/src/main/assets
        mkdir -p fresh-app/app/src/main/res/values

        # آپ کی صرف ویب فائلوں کو نئے اثاثوں میں منتقل کرنا
        find . -maxdepth 1 ! -name 'fresh-app' ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec cp -r {} fresh-app/app/src/main/assets/ \; 2>/dev/null || true

        # انڈیکس فائل کی موجودگی یقینی بنانا
        if [ ! -f fresh-app/app/src/main/assets/index.html ]; then
          find . -maxdepth 2 -name "index.html" -exec cp {} fresh-app/app/src/main/assets/ \; 2>/dev/null || true
        fi

        # نئی تھیم فائل بنانا تاکہ کریش نہ ہو
        cat << 'EOF' > fresh-app/app/src/main/res/values/styles.xml
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"></style>
        </resources>
        EOF

        # اینڈرائیڈ ایکس (AndroidX) کی پراپرٹیز یہاں زبردستی ایڈ کرنا
        echo "include ':app'" > fresh-app/settings.gradle
        echo "android.useAndroidX=true" > fresh-app/gradle.properties
        echo "android.enableJetifier=true" >> fresh-app/gradle.properties

        # روٹ بلڈ فائل
        cat << 'EOF' > fresh-app/build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # ایپ بلڈ فائل
        cat << 'EOF' > fresh-app/app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.janimrankhan.statull'
            compileSdk 34
            defaultConfig {
                applicationId "com.janimrankhan.statull"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        # درست مینی فیسٹ فائل
        cat << 'EOF' > fresh-app/app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://android.com" package="com.janimrankhan.statull">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:theme="@style/AppTheme" android:label="Statull" android:allowBackup="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # جاوا فائل
        cat << 'EOF' > fresh-app/app/src/main/java/com/janimrankhan/statull/MainActivity.java
        package com.janimrankhan.statull;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF

    - name: Pure Build Without Cache
      run: |
        cd fresh-app
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug --no-build-cache

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Statull-App-APK
        path: fresh-app/app/build/outputs/apk/debug/app-debug.apk
